<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs – Postal OCR</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="ent-header">
        <div class="header-content container">
            <div class="header-logo" onclick="location.href='{{ url_for('index') }}'" style="cursor:pointer">
                <div class="logo-text"><h1>FormDigitizer</h1><span>Admin Console</span></div>
            </div>
            <div class="header-actions">
                <a href="{{ url_for('index') }}" class="btn-nav">Dashboard</a>
                <a href="{{ url_for('manage_users') }}" class="btn-nav">Manage Users</a>
            </div>
        </div>
    </header>

    <main class="container py-5">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h4 mb-0">System Activity Logs</h2>
                <span class="badge bg-primary">Total Logs: {{ logs|length }}</span>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>User</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>IP Address</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td class="text-muted small">{{ log.time }}</td>
                            <td><strong>{{ log.username }}</strong></td>
                            <td><span class="activity-type-badge {{ log.type|lower|replace(' ', '-') }}">{{ log.type }}</span></td>
                            <td>{{ log.description }}</td>
                            <td class="text-muted">{{ log.ip or 'N/A' }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <style>
        .activity-type-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .login { background: #dcfce7; color: #166534; }
        .login-failure { background: #fee2e2; color: #991b1b; }
        .sign-up { background: #fef9c3; color: #854d0e; }
        .form-extraction { background: #e0f2fe; color: #075985; }
    </style>
</body>
</html>
