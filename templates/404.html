<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="error-page-body">
    <div class="error-page-card card">
        <div class="error-page-code">404</div>
        <h1 class="error-page-title">Page Not Found</h1>
        <p class="error-page-msg">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="{{ url_for('index') }}" class="btn-primary" style="text-decoration:none; display:inline-block; margin-top:8px;">
            ← Back to Home
        </a>
    </div>
</body>
</html>
